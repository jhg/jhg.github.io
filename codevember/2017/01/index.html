<html>
  <head>
    <title>Codevember 2017/01</title>
    <meta content="">
    <style>
      body {
        background-image: url('background.jpg');
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
      }
      .Flip3D > * {
        width: 15em;
        height: 15em;
        border: 1px solid black;
        background-color: white;
        position: absolute;
        transition: transform 1s, z-index 1.1s;
        transition-timing-function: linear;
        transform: rotateY(0deg);
        transition-delay: 1s;
        z-index: 1;
        overflow: hidden;
        backface-visibility: hidden;
      }
      .Flip3D > * + * {
        transform: rotateY(91deg);
        transition-delay: 0s;
        z-index: 0;
      }
      .Flip3D:hover > * {
        transform: rotateY(-91deg);
        transition-delay: 0s;
        z-index: 1;
        transition: transform 1s, z-index 0.1s;
        transition-timing-function: linear;
      }
      .Flip3D:hover > * + * {
        transform: rotateY(0deg);
        transition-delay: 1s;
        z-index: 2;
      }
      .Flip3D > * > img {
        max-width: calc(100% - 10px);
        max-height: calc(100% - 10px);
        border: 5px solid white;
      }
      .Flip3D {
        position: absolute;
        top: calc(50% - 7.5em);
        left: calc(50% - 7.5em);
        width: 15em;
        height: 15em;
        border: 0px solid black;
        perspective: 50em;
      }
      header, footer {
        text-align: center;
        color: white;
        background-color: black;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Codevember 2017/01 Galaxy</h1>
      <h2>CSS hover flip3D</h2>
    </header>
    <main>
      <div class="Flip3D">
        <div>
          <img src="Galaxy.jpg" />
        </div>
        <div>
          <img src="Relativity.jpg" />
        </div>
      </div>
    </main>
    <footer>
      <p>
        <a href="//jhg.github.io/">
          Jesús Hernández Gormaz
        </a>
      </p>
    </footer>
  </body>
</html>
