    <title></title>

    <style>
      body {
        background-color: #000033;
      }
      body > main {
        position: absolute;
        top: 0%;
        left: 0%;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      main div {
        transition: background-color 1.25s;
      }
      main > div {
        position: absolute;
        top: 0%;
        left: calc(50% - (30% / 2));
        width: 30%;
        height: 12.75%;
      }
      div > div {
        position: absolute;
        top: 92%;
        width: 54%;
        height: 100%;
      }
      div > div:nth-child(odd) {
        left: -48%;
        transform: rotateZ(4deg);
        transform-origin: right top;
      }
      div > div:nth-child(even) {
        left: 94%;
        transform: rotateZ(-4deg);
        transform-origin: left top;
      }
      div:hover {
        background-color: yellow;
      }
      @keyframes rayodd {
        0% {
          transform: rotateZ(4deg);
        }
        25% {
          transform: rotateZ(0deg);
        }
        50% {
          transform: rotateZ(-2deg);
        }
        75% {
          transform: rotateZ(0deg);
        }
        100% {
          transform: rotateZ(4deg);
        }
      }
      div > div:hover:nth-child(odd) {
        animation-name: rayodd;
        animation-duration: 0.25s;
        animation-iteration-count: infinite;
      }
      @keyframes rayeven {
        0% {
          transform: rotateZ(-4deg);
        }
        25% {
          transform: rotateZ(0deg);
        }
        50% {
          transform: rotateZ(2deg);
        }
        75% {
          transform: rotateZ(0deg);
        }
        100% {
          transform: rotateZ(-4deg);
        }
      }
      div > div:hover:nth-child(even) {
        animation-name: rayeven;
        animation-duration: 0.25s;
        animation-iteration-count: infinite;
      }
      header, footer {
        text-align: center;
        color: white;
      }
    </style>
