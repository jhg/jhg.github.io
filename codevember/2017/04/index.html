<html>
  <head>
    <title></title>
    <meta content="">
    <style>
      body {
        background-image: url('background.jpg');
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
      }
      @keyframes sapphirebg {
        0% {
          background-color: rgba(255, 0, 0, 0);
        }
        50% {
          background-color: rgba(255, 0, 0, 0.5);
        }
        100% {
          background-color: rgba(0, 0, 255, 0.5);
        }
      }
      section {
        background-color: rgba(0, 0, 255, 0.5);
        animation-name: sapphirebg;
        animation-duration: 30s;
        position: absolute;
        top: 0px;
        left: 0px;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      @keyframes onrailsgo {
        0% {
          width: 0em;
          height: 0em;
          top: 19%;
          left: 30%;
          perspective: 10em;
        }
        40% {
          width: 1em;
          height: 1em;
          top: calc(18% - 0.5em);
          left: calc(38% - 0.5em);
          perspective: 40em;
        }
        70% {
          width: 3em;
          height: 3em;
          top: calc(19% - 1.5em);
          left: calc(48% - 1.5em);
          perspective: 70em;
        }
        90% {
          width: 8em;
          height: 8em;
          top: calc(30% - 4em);
          left: calc(56% - 4em);
          perspective: 90em;
        }
        96% {
          width: 16em;
          height: 16em;
          top: calc(65% - 8em);
          left: calc(59% - 8em);
          perspective: 96em;
        }
        100% {
          width: 20em;
          height: 20em;
          top: calc(70% - 10em);
          left: calc(56% - 10em);
          perspective: 100em;
        }
      }
      div.onrails {
        position: absolute;
        width: 20em;
        height: 20em;
        top: calc(70% - 10em);
        left: calc(56% - 10em);
        animation-name: onrailsgo;
        animation-duration: 20s;
        animation-timing-function: linear;
        perspective: 100em;
      }
      .onrails > img {
        position: absolute;
        width: 100%;
        transform: rotateY(0deg);
        backface-visibility: hidden;
      }
      @keyframes rubyonrails {
        0% {
          transform: rotateY(90deg);
          opacity: 1;
        }
        75% {
          transform: rotateY(45deg);
          opacity: 1;
        }
        100% {
          transform: rotateY(0deg);
          opacity: 0;
        }
      }
      .onrails > .ruby {
        transform: rotateY(-90deg);
        animation-name: rubyonrails;
        animation-duration: 20s;
        opacity: 0;
      }
      @keyframes sapphireonrails {
        0% {
          transform: rotateY(45deg);
          opacity: 0;
        }
        75% {
          transform: rotateY(45deg);
          opacity: 0;
        }
        100% {
          transform: rotateY(0deg);
          opacity: 1;
        }
      }
      .onrails > .sapphire {
        transform: rotateY(0deg);
        animation-name: sapphireonrails;
        animation-duration: 20s;
        opacity: 1;
      }
      h1.onrails {
        margin-top: 6em;
        text-align: center;
        color: white;
      }
      h1.onrails > .sapphire {
        margin-left: -4em;
      }
      header, footer {
        text-align: center;
        color: white;
      }
      a {
        background-color: black;
      }
    </style>
  </head>
  <body>
    <section>
      <header>
        <h1>Codevember 2017/04 Sapphire</h1>
        <h2>Sapphire vs Ruby (only a joke)</h2>
      </header>
      <footer>
        <p>
          <a href="//jhg.github.io/">
            Jesús Hernández Gormaz
          </a>
        </p>
      </footer>
      <main>
        <h1 class="onrails">
          <span class="ruby">Ruby</span>
          <span class="sapphire">Sapphire</span>
          On Rails
        </h1>
        <div class="onrails">
          <img class="ruby" src="ruby.png" />
          <img class="sapphire" src="sapphire.png" />
        </div>
      </main>
    </section>
  </body>
</html>
