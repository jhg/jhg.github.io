    <title></title>

    <style>
      body {
        overflow: hidden;
        background-image: url('background.jpg');
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
      }
      @keyframes leafmove {
        0% {
          transform: rotateX(45deg) rotateY(45deg) rotateZ(45deg);
          top: -50em;
        }
        25% {
          transform: rotateX(30deg) rotateY(60deg) rotateZ(15deg);
        }
        50% {
          transform: rotateX(60deg) rotateY(30deg) rotateZ(90deg);
        }
        75% {
          transform: rotateX(30deg) rotateY(60deg) rotateZ(0deg);
        }
        100% {
          transform: rotateX(45deg) rotateY(45deg) rotateZ(180deg);
          top: 100em;
        }
      }
      img.leaf {
        position: absolute;
        top: -50em;
        width: 8em;
        transform: rotateX(45deg) rotateY(45deg) rotateZ(45deg);
        animation-name: leafmove;
        animation-duration: 20s;
        animation-iteration-count: infinite;
        left: 50%;
        transition: width 10s, height 10s, margin-left 15s;
      }
      img.leaf:nth-child(2n) {
        animation-delay: 2s;
      }
      img.leaf:nth-child(3n) {
        animation-delay: 4s;
        left: 15%;
      }
      img.leaf:nth-child(4n) {
        animation-delay: 6s;
        margin-left: 15em;
      }
      img.leaf:nth-child(5n) {
        animation-delay: 8s;
        left: 25%;
      }
      img.leaf:nth-child(6n) {
        animation-delay: 12s;
        margin-left: -15em;
      }
      img.leaf:nth-child(7n) {
        animation-delay: 16s;
        left: 75%;
      }
      img.leaf:nth-child(8n) {
        animation-delay: 20s;
        left: 85%;
      }
      img.leaf:hover:nth-child(odd) {
        width: 0em;
        margin-left: -50em;
        animation-play-state: paused;
      }
      img.leaf:hover:nth-child(even) {
        width: 0em;
        margin-left: 50em;
        animation-play-state: paused;
      }
      header, footer {
        text-align: center;
        color: white;
      }
      a {
        background-color: black;
      }
    </style>
